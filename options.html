<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>中译中设置</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="settings">
      <header class="settings-header">
        <h1>中译中</h1>
        <p>配置你的大语言模型 Key。Key 会保存在浏览器本地。</p>
      </header>

      <form id="options-form" class="settings-form">
        <label>
          <span>API Key</span>
          <input id="apiKey" name="apiKey" type="password" autocomplete="off" placeholder="sk-..." />
        </label>

        <label>
          <span>Base URL</span>
          <input id="baseUrl" name="baseUrl" type="url" placeholder="https://api.deepseek.com" />
        </label>

        <label>
          <span>模型</span>
          <input id="model" name="model" type="text" placeholder="deepseek-chat" />
        </label>

        <label>
          <span>温度</span>
          <input id="temperature" name="temperature" type="number" min="0" max="2" step="0.1" />
        </label>

        <label>
          <span>最大输出 token</span>
          <input id="maxTokens" name="maxTokens" type="number" min="300" max="2000" step="50" />
        </label>

        <div class="actions">
          <button type="submit">保存</button>
          <button id="reset" type="button">恢复默认</button>
        </div>

        <p id="status" class="status" role="status"></p>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
